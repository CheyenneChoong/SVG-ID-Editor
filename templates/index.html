<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG ID Editor</title>
</head>

<style>
    body {
        background-color: black;
        color: white;
        display: grid;
        margin-left: 3%;
        margin-right: 3%;
        font-family: Arial, Helvetica, sans-serif;
    }

    #svg-preview {
        min-height: 20vh;
    }

    .panel {
        display: inline-flex;
        flex-wrap: wrap;
        justify-content: left;
        align-items: center;
        gap: 20px;
        margin-bottom: 10px;
    }

    .btn, input[type=submit] {
        background-color: blanchedalmond;
        color: black;
        font-weight: bold;
        font-size: 15px;
        padding: 5px;
        border-radius: 3px;
    }
</style>

<body>
    <h1>SVG ID Editor</h1>
    <div class="panel">
        <form id = "uploadSVG" action = "/uploadSVG" method = "post" enctype="multipart/form-data">
            <label class="btn">
                <span>Upload SVG</span>
                <input type = "file" name="svgFile" accept=".svg" onchange = "document.getElementById('uploadSVG').submit()" style="display: none;" />
            </label>
        </form>
        <form id = "uploadText" action = "/uploadText" method = "post" enctype="multipart/form-data">
            <label class="btn">
                <span>Upload ID</span>
                <input type = "file" name="idFile" accept=".txt" onchange = "document.getElementById('uploadText').submit()" style="display: none;" />
            </label>
        </form>
        <form action = "/idSVG" method = "post"><input type="submit" value="ID SVG" /></form>
        <form action = "/export" method = "post"><input type = "submit" value="Export" /></form>
    </div>
    <div class="panel">
        <form action = "/highlight" method = "post">
            <input type = "text" name = "idInput" />
            <input type = "color" name = "color" />
            <input type = "submit" value="Highlight"/>
        </form>
    </div>
    {{ preview|safe }}
</body>
</html>
